{% extends "staff/base.html" %}
{% block title %}Error{% endblock %}
{% block page_title %}Error de servicio{% endblock %}
{% block page_subtitle %}El panel no pudo obtener los datos{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-24">
  <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mb-4">
    <svg class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
    </svg>
  </div>
  <h2 class="text-base font-semibold text-gray-900 mb-1">No se pudo cargar la página</h2>
  <p class="text-sm text-gray-400 mb-6 text-center max-w-sm">{{ message }}</p>
  <a href="javascript:location.reload()"
     class="text-sm text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
    Reintentar →
  </a>
</div>
{% endblock %}
