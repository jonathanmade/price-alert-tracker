<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/static/staff/img/favicon.svg">
  <title>Nueva contraseña · PriceAlert</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-indigo-400 font-bold text-2xl tracking-tight">PriceAlert</span>
      <p class="text-slate-500 text-sm mt-1">Panel de gestión interna</p>
    </div>
    <div class="bg-slate-900 border border-white/5 rounded-2xl p-8">
      <h2 class="text-white font-semibold text-lg mb-6">Nueva contraseña</h2>
      <div id="error" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl px-4 py-3 mb-5"></div>
      <div id="success" class="hidden bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm rounded-xl px-4 py-3 mb-5">
        Contraseña actualizada. Redirigiendo al panel...
      </div>
      <form id="form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Nueva contraseña</label>
          <div class="relative">
            <input id="password" type="password" required minlength="8" placeholder="••••••••"
              class="w-full bg-slate-800 border border-white/10 text-white placeholder-slate-600
                     rounded-lg px-4 py-2.5 text-sm pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
            <button type="button" onclick="togglePassword('password', this)"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
              <svg class="w-4 h-4 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                     -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg class="w-4 h-4 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7
                     a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                     M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
                     m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                     m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7
                     a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Confirmar contraseña</label>
          <div class="relative">
            <input id="confirm" type="password" required minlength="8" placeholder="••••••••"
              class="w-full bg-slate-800 border border-white/10 text-white placeholder-slate-600
                     rounded-lg px-4 py-2.5 text-sm pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
            <button type="button" onclick="togglePassword('confirm', this)"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
              <svg class="w-4 h-4 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                     -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg class="w-4 h-4 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7
                     a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                     M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
                     m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                     m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7
                     a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2">
          Actualizar contraseña
        </button>
      </form>
      <p class="text-center mt-4">
        <a href="/staff/login/" class="text-xs text-slate-500 hover:text-indigo-400 transition-colors">Volver al login</a>
      </p>
    </div>
  </div>
  <script>
    const SUPABASE_URL = '{{ supabase_url }}';
    const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const showError = msg => {
      const el = document.getElementById('error');
      el.textContent = msg; el.classList.remove('hidden');
    };

    sb.auth.onAuthStateChange(async (event) => {
      if (event !== 'PASSWORD_RECOVERY') return;
      document.getElementById('form').addEventListener('submit', async e => {
        e.preventDefault();
        const pwd = document.getElementById('password').value;
        const cfm = document.getElementById('confirm').value;
        if (pwd !== cfm) { showError('Las contraseñas no coinciden.'); return; }
        const { error } = await sb.auth.updateUser({ password: pwd });
        if (error) { showError(error.message); return; }
        document.getElementById('form').classList.add('hidden');
        document.getElementById('success').classList.remove('hidden');
        setTimeout(() => window.location.href = '/staff/', 2000);
      });
    });
  </script>
  <script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.querySelector('.eye-open').classList.toggle('hidden', isPassword);
    btn.querySelector('.eye-closed').classList.toggle('hidden', !isPassword);
  }
  </script>
</body>
</html>
