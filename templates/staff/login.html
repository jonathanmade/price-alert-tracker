<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso staff · PriceAlert</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <span class="text-indigo-400 font-bold text-2xl tracking-tight">PriceAlert</span>
      <p class="text-slate-500 text-sm mt-1">Panel de gestión interna</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-white/5 rounded-2xl p-8">
      <h2 class="text-white font-semibold text-lg mb-6">Iniciar sesión</h2>

      {% if error %}
      <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl px-4 py-3 mb-5">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/staff/login/" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Email</label>
          <input
            type="email"
            name="email"
            required
            autofocus
            placeholder="admin@pricealert.es"
            class="w-full bg-slate-800 border border-white/10 text-white placeholder-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Contraseña</label>
          <input
            type="password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full bg-slate-800 border border-white/10 text-white placeholder-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
          <div class="text-right mt-1">
            <a href="/staff/password-reset/"
               class="text-xs text-slate-500 hover:text-indigo-400 transition-colors">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2"
        >
          Entrar al panel
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">
      Solo para administradores y gestores de PriceAlert.
    </p>
  </div>

</body>
</html>
